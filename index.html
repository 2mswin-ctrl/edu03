<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>선생님께 질문하기 - 오션중학교</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; }
        .bg-custom-blue { background-color: #2563eb; }
        .bg-dark-navy { background-color: #0f172a; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">

    <div class="max-w-5xl w-full bg-white rounded-[40px] shadow-2xl overflow-hidden flex flex-col md:flex-row">
        <!-- 왼쪽 파란색 안내 섹션 -->
        <div class="bg-custom-blue w-full md:w-5/12 p-10 md:p-14 text-white flex flex-col justify-between">
            <div>
                <h1 class="text-3xl md:text-4xl font-bold mb-6 leading-tight">선생님께 질문하기</h1>
                <p class="text-blue-100 text-lg mb-12 leading-relaxed opacity-90">
                    수업 내용, 동아리 가입, 진로 상담 등 궁금한 점이 있다면 언제든 편하게 메시지를 남겨주세요.
                </p>

                <div class="space-y-8">
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 bg-white/20 rounded-full flex items-center justify-center">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
                            </svg>
                        </div>
                        <span class="text-lg font-medium">오션중학교 국어 교실</span>
                    </div>
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 bg-white/20 rounded-full flex items-center justify-center">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                            </svg>
                        </div>
                        <span class="text-lg font-medium">쉬는 시간, 점심 시간 방문 환영</span>
                    </div>
                </div>
            </div>
            
            <div class="mt-12 flex gap-4 opacity-50">
                <!-- 하단 로고 아이콘들 (이미지 유사 구현) -->
                <div class="w-8 h-8 border-2 border-white rounded flex items-center justify-center text-xs font-bold">국</div>
                <div class="w-8 h-8 border-2 border-white rounded flex items-center justify-center text-xs font-bold">어</div>
            </div>
        </div>

        <!-- 오른쪽 입력 폼 섹션 -->
        <div class="w-full md:w-7/12 p-10 md:p-14">
            <form id="consultingForm" class="space-y-6">
                <div class="grid grid-cols-3 gap-4">
                    <div>
                        <label class="block text-gray-500 font-medium mb-2">학년</label>
                        <select name="grade" class="w-full px-4 py-4 bg-gray-50 border border-gray-100 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500" required>
                            <option value="1">1학년</option>
                            <option value="2">2학년</option>
                            <option value="3">3학년</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-gray-500 font-medium mb-2">반</label>
                        <input type="number" name="classRoom" placeholder="예: 2" class="w-full px-4 py-4 bg-gray-50 border border-gray-100 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500" required>
                    </div>
                    <div>
                        <label class="block text-gray-500 font-medium mb-2">이름</label>
                        <input type="text" name="name" placeholder="홍길동" class="w-full px-4 py-4 bg-gray-50 border border-gray-100 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500" required>
                    </div>
                </div>

                <div>
                    <label class="block text-gray-500 font-medium mb-2">문의 구분</label>
                    <select name="category" class="w-full px-4 py-4 bg-gray-50 border border-gray-100 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 appearance-none" required>
                        <option value="수업 질문">수업 내용 질문</option>
                        <option value="동아리 상담">동아리 가입/활동 상담</option>
                        <option value="진로 상담">진로 및 성적 상담</option>
                        <option value="기타 상담" selected>기타 상담</option>
                    </select>
                </div>

                <div>
                    <label class="block text-gray-500 font-medium mb-2">내용</label>
                    <textarea name="message" rows="5" placeholder="궁금한 내용을 자유롭게 적어주세요." class="w-full px-4 py-4 bg-gray-50 border border-gray-100 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none" required></textarea>
                </div>

                <button type="submit" id="submitBtn" class="w-full bg-dark-navy text-white py-5 rounded-2xl font-bold text-xl hover:bg-black transition-colors shadow-lg">
                    메시지 보내기
                </button>
            </form>
            
            <div id="successMsg" class="hidden mt-6 p-4 bg-green-50 text-green-700 rounded-xl text-center font-medium border border-green-200">
                메시지가 선생님께 전달되었습니다! 곧 답변 드릴게요.
            </div>
        </div>
    </div>

    <script>
        const scriptURL = 'YOUR_GOOGLE_SCRIPT_URL_HERE'; // 여기에 배포한 스크립트 URL을 입력하세요.
        const form = document.getElementById('consultingForm');
        const btn = document.getElementById('submitBtn');
        const msg = document.getElementById('successMsg');

        form.addEventListener('submit', e => {
            e.preventDefault();
            btn.disabled = true;
            btn.innerText = '전송 중...';

            fetch(scriptURL, { method: 'POST', body: new FormData(form)})
                .then(response => {
                    btn.classList.add('hidden');
                    msg.classList.remove('hidden');
                    form.reset();
                })
                .catch(error => {
                    console.error('Error!', error.message);
                    alert('전송 중 오류가 발생했습니다. 다시 시도해 주세요.');
                    btn.disabled = false;
                    btn.innerText = '메시지 보내기';
                });
        });
    </script>
</body>
</html>
